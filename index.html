<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random URL Rotator</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>

    <script>
        // Add your Google Form links here
        const formLinks = [
            "https://forms.gle/6SzgYsU7aTzegLoZ9",
            "https://forms.gle/g2yZ2QSmrhnRjxHN6",
            "https://forms.gle/N7Efi8h4tb1FRUus5",
            "https://forms.gle/HV4Usj5M71qR2Fa58"
        ];

        // Pick a random link
        function getRandomForm() {
            const index = Math.floor(Math.random() * formLinks.length);
            return formLinks[index];
        }

        // Redirect to random form on page load
        window.onload = function () {
            const randomForm = getRandomForm();
            window.location.href = randomForm;
        };
    </script>

</body>

</html>
